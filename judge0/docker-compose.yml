version: "3.8"

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: 50M

services:
  server:
    image: judge0/judge0:latest
    container_name: judge0-server
    environment:
      - REDIS_PASSWORD
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /box:/box
    ports:
      - "2358:2358"
    privileged: true
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    mem_limit: 512m
    cpus: 0.5
    <<: *default-logging
    restart: always

  worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    environment:
      - REDIS_PASSWORD
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /box:/box
    privileged: true
    mem_limit: 512m
    cpus: 0.5
    <<: *default-logging
    restart: always

  db:
    image: postgres:16.2
    container_name: judge0-db
    env_file: judge0.conf
    volumes:
      - data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    mem_limit: 400m
    cpus: 0.3
    <<: *default-logging
    restart: always

  redis:
    image: redis:6.2   # 🔥 IMPORTANT (NOT 7)
    container_name: judge0-redis
    command: redis-server --appendonly no
    mem_limit: 256m
    cpus: 0.2
    <<: *default-logging
    restart: always

volumes:
  data: